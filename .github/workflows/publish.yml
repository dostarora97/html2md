name: Publish to JSR

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for JSR OIDC provenance
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies (frozen)
        run: deno install --frozen --entrypoint mod.ts --entrypoint cli.ts

      - name: Run CI checks before publish
        run: deno task ci

      - name: Publish to JSR (with provenance)
        run: deno publish
