_template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...$TAG

categories:
  - title: "✨ Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - bug
      - fix
  - title: "📦 Dependencies"
    labels:
      - dependencies
  - title: "🔧 Maintenance"
    labels:
      - chore
      - refactor
      - docs

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - chore
      - dependencies
      - docs
  default: patch

autolabeler:
  - label: feature
    title:
      - "/^feat/i"
  - label: bug
    title:
      - "/^fix/i"
  - label: chore
    title:
      - "/^chore/i"
      - "/^refactor/i"
  - label: docs
    title:
      - "/^docs/i"
  - label: dependencies
    title:
      - "/^chore\\(deps\\)/i"
