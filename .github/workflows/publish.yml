name: Publish to JSR

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for JSR OIDC provenance
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.5.1"

      - name: Install dependencies (frozen)
        run: deno install --frozen

      - name: Run CI checks before publish
        run: deno task ci

      - name: Publish to JSR (with provenance)
        run: deno publish
